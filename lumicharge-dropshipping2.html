<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const {createElement:h,useState,useEffect,useRef,useCallback,Fragment}=React;
const pad=n=>String(n).padStart(2,'0');

// в”Җв”Җ TOAST в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let _subs=[],_tid=0;
function showToast(msg){
  const id=++_tid;
  _subs.forEach(f=>f(id,msg));
  setTimeout(()=>_subs.forEach(f=>f(id,null)),3500);
}
function ToastStack(){
  const [toasts,setToasts]=useState([]);
  useEffect(()=>{
    const fn=(id,msg)=>setToasts(t=>msg?[...t,{id,msg}]:t.filter(x=>x.id!==id));
    _subs.push(fn);
    return()=>{_subs=_subs.filter(f=>f!==fn)};
  },[]);
  if(!toasts.length)return null;
  return h('div',{style:{position:'fixed',bottom:'1.5rem',right:'1.5rem',zIndex:1060,display:'flex',flexDirection:'column',gap:'.5rem'}},
    toasts.map(t=>h('div',{key:t.id,className:'toast show',role:'alert'},
      h('div',{className:'toast-body d-flex align-items-center gap-2'},
        h('span',{style:{color:'var(--ok)',fontSize:'1.1rem'}},'вң“'),t.msg
      )
    ))
  );
}

// в”Җв”Җ ANIMATED NUMBER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function AnimNum({end,dec=0,suffix=''}){
  const [val,setVal]=useState(0);
  const ref=useRef(null);
  const done=useRef(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(!e.isIntersecting||done.current)return;
      done.current=true;
      const dur=1800,t0=performance.now();
      const tick=now=>{
        const p=Math.min((now-t0)/dur,1);
        const ease=1-Math.pow(1-p,3);
        setVal(parseFloat((end*ease).toFixed(dec)));
        if(p<1)requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    },{threshold:.4});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[end,dec]);
  return h('span',{ref},(dec?val.toFixed(dec):Math.floor(val))+suffix);
}

// в”Җв”Җ COUNTDOWN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function useCountdown(total){
  const [s,setS]=useState(total);
  useEffect(()=>{
    const id=setInterval(()=>setS(v=>Math.max(0,v-1)),1000);
    return()=>clearInterval(id);
  },[]);
  return{h:Math.floor(s/3600),m:Math.floor((s%3600)/60),s:s%60};
}

// в”Җв”Җ 3D CANVAS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function ProductCanvas(){
  const ref=useRef(null);
  useEffect(()=>{
    let destroyed=false;
    function tryInit(){
      const canvas=ref.current;
      if(destroyed||!canvas)return;
      if(typeof THREE==='undefined'){
        // THREE not loaded yet, poll
        setTimeout(tryInit,100);
        return;
      }
      const W=canvas.offsetWidth;
      // width fallback handled in initThree
      initThree(canvas);
    }
    // Small delay to ensure CSS layout is painted
    const t=setTimeout(tryInit,50);
    return()=>{destroyed=true;clearTimeout(t)};
  },[]);
  return h('div',{style:{position:'relative',minHeight:340}},
    h('canvas',{ref,id:'chargerCanvas',width:480,height:340,style:{display:'block',width:'100%',height:'340px'}}),
    h('div',{style:{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',fontSize:'.63rem',color:'rgba(201,168,76,.45)',letterSpacing:'.1em',whiteSpace:'nowrap',pointerEvents:'none'}},'ARRASTRA PARA ROTAR')
  );
}

function initThree(canvas){
  const T=window.THREE;
  if(!T)return;
  const dpr=Math.min(window.devicePixelRatio||1,navigator.hardwareConcurrency<=4?1:2);
  const W=canvas.offsetWidth||canvas.parentElement?.offsetWidth||480,H=340;
  const renderer=new T.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setSize(W,H,false);renderer.setPixelRatio(dpr);
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=T.PCFSoftShadowMap;
  renderer.toneMapping=T.ACESFilmicToneMapping;renderer.toneMappingExposure=1.4;
  renderer.setClearColor(0,0);
  const scene=new T.Scene();
  const camera=new T.PerspectiveCamera(32,W/H,.1,100);
  camera.position.set(0,4.2,7);camera.lookAt(0,.3,0);
  const g=new T.Group();scene.add(g);
  const M=(geo,mat)=>new T.Mesh(geo,mat);
  const std=o=>new T.MeshStandardMaterial(o);

  const pad3d=M(new T.CylinderGeometry(2.1,2.18,.28,80),std({color:0x1c1c2a,metalness:.92,roughness:.18}));
  pad3d.receiveShadow=pad3d.castShadow=true;g.add(pad3d);
  const bevel=M(new T.TorusGeometry(2.14,.04,8,80),std({color:0x888899,metalness:1,roughness:.05}));
  bevel.rotation.x=Math.PI/2;bevel.position.y=-.12;g.add(bevel);
  const top=M(new T.CylinderGeometry(2.05,2.05,.02,80),std({color:0x14141f,metalness:.6,roughness:.35}));
  top.position.y=.15;g.add(top);
  const ledMat=std({color:0xC9A84C,emissive:0xC9A84C,emissiveIntensity:3,roughness:.05,transparent:true,opacity:.95});
  const led=M(new T.TorusGeometry(1.72,.07,16,120),ledMat);
  led.rotation.x=Math.PI/2;led.position.y=.155;g.add(led);
  const glowMat=std({color:0xC9A84C,emissive:0xC9A84C,emissiveIntensity:1.5,transparent:true,opacity:.18,depthWrite:false});
  const glow=M(new T.TorusGeometry(1.72,.18,8,120),glowMat);
  glow.rotation.x=Math.PI/2;glow.position.y=.155;g.add(glow);
  [.35,.55,.75].forEach((r,i)=>{
    const arc=M(new T.TorusGeometry(r,.018,8,60,Math.PI*1.4),std({color:0xC9A84C,emissive:0xC9A84C,emissiveIntensity:.6,roughness:.3}));
    arc.rotation.x=Math.PI/2;arc.rotation.z=-Math.PI*.7+i*.05;arc.position.y=.168;g.add(arc);
  });
  const pg=new T.Group();pg.position.set(.15,.17,0);pg.rotation.y=.25;g.add(pg);
  pg.add(M(new T.BoxGeometry(.82,.07,1.72),std({color:0x0a0a12,metalness:.9,roughness:.12})));
  pg.add(M(new T.BoxGeometry(.84,.065,1.74),std({color:0x555566,metalness:1,roughness:.05})));
  const screenMat=std({color:0x0d1525,emissive:0x1a3060,emissiveIntensity:.8,roughness:.1});
  const scr=M(new T.BoxGeometry(.72,.04,1.55),screenMat);scr.position.y=.055;pg.add(scr);
  const batt=M(new T.BoxGeometry(.32,.01,.1),std({color:0x2ECC71,emissive:0x2ECC71,emissiveIntensity:1}));
  batt.position.set(0,.066,0);pg.add(batt);
  scene.add(new T.AmbientLight(0xffffff,.25));
  const key=new T.DirectionalLight(0xfff5e0,2.5);key.position.set(6,10,6);key.castShadow=true;
  key.shadow.mapSize.set(1024,1024);scene.add(key);
  const fill=new T.DirectionalLight(0x8899cc,.6);fill.position.set(-6,4,-4);scene.add(fill);
  const rim=new T.DirectionalLight(0xC9A84C,1.2);rim.position.set(0,3,-8);scene.add(rim);
  const lp=new T.PointLight(0xC9A84C,4,6);lp.position.set(0,.8,0);g.add(lp);

  let drag=false,px=0,vel=0;
  canvas.addEventListener('mousedown',e=>{drag=true;px=e.clientX;canvas.style.cursor='grabbing'});
  canvas.addEventListener('touchstart',e=>{drag=true;px=e.touches[0].clientX},{passive:true});
  window.addEventListener('mouseup',()=>{drag=false;canvas.style.cursor='grab'});
  window.addEventListener('touchend',()=>{drag=false});
  window.addEventListener('mousemove',e=>{if(!drag)return;vel=(e.clientX-px)*.012;g.rotation.y+=vel;px=e.clientX});
  window.addEventListener('touchmove',e=>{if(!drag)return;vel=(e.touches[0].clientX-px)*.012;g.rotation.y+=vel;px=e.touches[0].clientX},{passive:true});

  let raf;
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)animate()});
  window.addEventListener('resize',()=>{const W2=canvas.offsetWidth;camera.aspect=W2/H;camera.updateProjectionMatrix();renderer.setSize(W2,H,false)},{passive:true});

  let hue=0,t=0;
  function animate(){
    raf=requestAnimationFrame(animate);
    if(document.hidden)return;
    t+=.016;hue+=.003;
    if(!drag){vel*=.95;g.rotation.y+=.004+vel}
    const col=new T.Color().setHSL(hue%1,.9,.55);
    ledMat.color.set(col);ledMat.emissive.set(col);
    glowMat.color.set(col);glowMat.emissive.set(col);lp.color.set(col);
    g.position.y=Math.sin(t*.6)*.07;
    screenMat.emissiveIntensity=.5+Math.sin(t*1.2)*.3;
    renderer.render(scene,camera);
  }
  animate();
}

function Checkout({qty,onSuccess}){
  const [f,setF]=useState({name:'',surname:'',email:'',address:'',city:'',zip:'',card:'',exp:'',cvv:''});
  const [err,setErr]=useState({});
  const [gift,setGift]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const BASE=25,iva=BASE*qty*.21,giftFee=gift?2.99:0,total=BASE*qty+iva+giftFee;
  const set=(k,v)=>{setF(p=>({...p,[k]:v}));setErr(p=>({...p,[k]:undefined}))};
  const fmtCard=v=>v.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim();
  const fmtExp=v=>{const d=v.replace(/\D/g,'').slice(0,4);return d.length>=3?d.slice(0,2)+'/'+d.slice(2):d};
  const validate=()=>{
    const e={};
    if(!f.name.trim())e.name='Obligatorio';
    if(!f.surname.trim())e.surname='Obligatorio';
    if(!f.email.includes('@'))e.email='Email invГЎlido';
    if(!f.address.trim())e.address='Obligatorio';
    if(!f.city.trim())e.city='Obligatorio';
    if(f.zip.length<4)e.zip='InvГЎlido';
    if(f.card.replace(/\s/g,'').length<13)e.card='NГәmero invГЎlido';
    if(f.exp.length<5)e.exp='Fecha invГЎlida';
    if(f.cvv.length<3)e.cvv='CVV invГЎlido';
    return e;
  };
  const submit=e=>{
    e.preventDefault();
    const errors=validate();
    if(Object.keys(errors).length){setErr(errors);return}
    setSubmitting(true);
    setTimeout(()=>{setSubmitting(false);onSuccess()},2000);
  };
  const field=(k,label,placeholder,extra={})=>h('div',{className:'mb-3'},
    h('label',{className:'form-label',style:{fontSize:'.75rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)'}},label),
    h('input',{className:`form-control${err[k]?' is-invalid':''}`,placeholder,value:f[k],onChange:e=>set(k,e.target.value),...extra}),
    err[k]&&h('div',{className:'invalid-feedback'},err[k])
  );
  const STEPS=['Carrito','Datos','Pago','ConfirmaciГіn'];
  return h('section',{id:'comprar',className:'py-5 py-lg-6'},
    h('div',{className:'container'},
      h('span',{className:'section-label mb-2'},'Pago seguro'),
      h('h2',{className:'mb-4',style:{fontSize:'clamp(1.8rem,3.5vw,2.8rem)'}},'Completa tu pedido'),
      h('div',{className:'d-flex align-items-start mb-5',style:{maxWidth:480}},
        STEPS.map((s,i)=>h(Fragment,{key:s},
          h('div',{className:`d-flex flex-column align-items-center ${i===0?'step-done':i===1?'step-active':''}`},
            h('div',{className:'step-circle'},i===0?'вң“':i+1),
            h('div',{className:'step-lbl d-none d-sm-block'},s)
          ),
          i<3&&h('div',{className:`step-line${i===0?' done':''}`,key:'l'+i})
        ))
      ),
      h('div',{className:'row g-4'},
        h('div',{className:'col-lg-5 col-xl-4'},
          h('div',{className:'card p-4'},
            h('h6',{className:'text-muted-c text-uppercase mb-3',style:{fontSize:'.74rem',letterSpacing:'.1em'}},'Resumen de pedido'),
            h('div',{className:'d-flex align-items-center gap-3 pb-3 mb-3',style:{borderBottom:'0.5px solid rgba(255,255,255,.06)'}},
              h('div',{style:{width:52,height:52,background:'var(--dark4)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.4rem',flexShrink:0}},'вҡЎ'),
              h('div',{className:'flex-grow-1'},
                h('div',{style:{fontSize:'.9rem',fontWeight:600}},'LumiCharge Pro'),
                h('div',{className:'text-muted-c',style:{fontSize:'.74rem'}},'Aluminio В· Qi 50W В· x'+qty)
              ),
              h('div',{className:'text-gold fw-bold'},'вӮ¬'+(BASE*qty).toFixed(2).replace('.',','))
            ),
            [['Subtotal','вӮ¬'+(BASE*qty).toFixed(2).replace('.',','),false],['EnvГӯo','Gratis рҹҺү',true],['IVA (21%)','вӮ¬'+iva.toFixed(2).replace('.',','),false],gift?['Regalo','вӮ¬2,99',false]:null]
              .filter(Boolean).map(([l,v,green])=>h('div',{key:l,className:'d-flex justify-content-between mb-2',style:{fontSize:'.87rem'}},
                h('span',{className:'text-muted-c'},l),
                h('span',{style:{color:green?'var(--ok)':'inherit'}},v)
              )),
            h('div',{className:'d-flex justify-content-between pt-3 mt-2',style:{borderTop:'0.5px solid rgba(255,255,255,.08)'}},
              h('span',{className:'fw-bold'},'Total'),
              h('span',{className:'text-gold fw-bold',style:{fontSize:'1.4rem'}},'вӮ¬'+total.toFixed(2).replace('.',','))
            )
          )
        ),
        h('div',{className:'col-lg-7 col-xl-8'},
          h('form',{noValidate:true,onSubmit:submit},
            h('div',{className:'row g-3'},
              h('div',{className:'col-sm-6'},field('name','Nombre','Tu nombre')),
              h('div',{className:'col-sm-6'},field('surname','Apellidos','Tus apellidos')),
              h('div',{className:'col-12'},field('email','Email','tu@email.com',{type:'email'})),
              h('div',{className:'col-12'},field('address','DirecciГіn','Calle, nГәmero, piso')),
              h('div',{className:'col-sm-7'},field('city','Ciudad','Ciudad')),
              h('div',{className:'col-sm-5'},field('zip','CГіdigo postal','28000',{maxLength:5})),
            ),
            h('div',{className:'mt-4 mb-3'},
              h('div',{style:{fontSize:'.75rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)',marginBottom:'.7rem'}},'MГ©todo de pago'),
              h('div',{className:'d-flex gap-2 flex-wrap mb-3'},
                ['рҹ’і Visa','рҹ’і Mastercard','рҹ…ҝпёҸ PayPal','рҹҚҺ Apple Pay','G Pay'].map(p=>h('span',{key:p,className:'pay-chip'},p))
              )
            ),
            h('div',{className:'row g-3'},
              h('div',{className:'col-12'},
                h('label',{className:'form-label',style:{fontSize:'.75rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)'}},'NГәmero de tarjeta'),
                h('input',{className:`form-control${err.card?' is-invalid':''}`,placeholder:'вҖўвҖўвҖўвҖў вҖўвҖўвҖўвҖў вҖўвҖўвҖўвҖў вҖўвҖўвҖўвҖў',value:f.card,maxLength:19,onChange:e=>set('card',fmtCard(e.target.value))}),
                err.card&&h('div',{className:'invalid-feedback'},err.card)
              ),
              h('div',{className:'col-6'},
                h('label',{className:'form-label',style:{fontSize:'.75rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)'}},'Caducidad'),
                h('input',{className:`form-control${err.exp?' is-invalid':''}`,placeholder:'MM/AA',value:f.exp,maxLength:5,onChange:e=>set('exp',fmtExp(e.target.value))}),
                err.exp&&h('div',{className:'invalid-feedback'},err.exp)
              ),
              h('div',{className:'col-6'},
                h('label',{className:'form-label',style:{fontSize:'.75rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)'}},'CVV'),
                h('input',{className:`form-control${err.cvv?' is-invalid':''}`,type:'password',placeholder:'вҖўвҖўвҖў',value:f.cvv,maxLength:4,onChange:e=>set('cvv',e.target.value.replace(/\D/g,'').slice(0,4))}),
                err.cvv&&h('div',{className:'invalid-feedback'},err.cvv)
              ),
            ),
            h('div',{className:'card p-3 mt-3 mb-3',style:{cursor:'pointer',borderColor:gift?'rgba(201,168,76,.4)':''},onClick:()=>setGift(g=>!g)},
              h('div',{className:'d-flex align-items-center gap-3'},
                h('input',{type:'checkbox',className:'form-check-input mt-0',checked:gift,readOnly:true,'aria-label':'Regalo',onClick:e=>e.stopPropagation()}),
                h('div',null,
                  h('div',{style:{fontSize:'.85rem',fontWeight:600}},'рҹҺҒ AГұadir envoltura de regalo ',h('span',{className:'text-gold',style:{fontSize:'.77rem'}},'(+вӮ¬2,99)')),
                  h('div',{className:'text-muted-c',style:{fontSize:'.75rem'}},'Tarjeta personalizada y papel premium')
                )
              ),
              gift&&h('textarea',{className:'form-control mt-2',rows:2,placeholder:'Escribe tu mensaje personalizadoвҖҰ',onClick:e=>e.stopPropagation(),style:{fontSize:'.84rem',resize:'none'}})

<script>
// в”Җв”Җ SECURITY LAYER 1: CSRF TOKEN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const _csrf = (()=>{
  const k='lumi_csrf';
  let t=sessionStorage.getItem(k);
  if(!t){t=crypto.randomUUID();sessionStorage.setItem(k,t);}
  return t;
})();

// в”Җв”Җ SECURITY LAYER 2: SESSION FINGERPRINT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const _fp = (()=>{
  const raw=[
    navigator.userAgent,
    navigator.language,
    screen.width+'x'+screen.height,
    screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency||0,
    navigator.platform||''
  ].join('|');
  // Simple hash
  let hash=0;
  for(let i=0;i<raw.length;i++){hash=(hash<<5)-hash+raw.charCodeAt(i);hash|=0;}
  const fp=Math.abs(hash).toString(36);
  if(!localStorage.getItem('lumi_fp'))localStorage.setItem('lumi_fp',fp);
  return fp;
})();

// в”Җв”Җ SECURITY LAYER 3: DEVTOOLS DETECTION в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
(()=>{
  const threshold=160;
  let warned=false;
  const check=()=>{
    const w=window.outerWidth-window.innerWidth>threshold||
             window.outerHeight-window.innerHeight>threshold;
    if(w&&!warned){
      warned=true;
      console.clear();
      console.log('%cвҡ  ATENCIГ“N','color:#E74C3C;font-size:24px;font-weight:bold');
      console.log('%cEsta consola es para desarrolladores. Si alguien te pidiГі que pegues algo aquГӯ, es un ataque de ingenierГӯa social.','color:#fff;font-size:14px');
    }
  };
  setInterval(check,1000);
  // Debugger trap
  // setInterval(()=>{debugger},50); // descomenta en producciГіn
})();

// в”Җв”Җ SECURITY LAYER 4: RIGHT-CLICK + SELECTION PROTECTION в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
(()=>{
  // Only block on production domain
  if(location.hostname==='lumicharge.es'||location.hostname==='www.lumicharge.es'){
    document.addEventListener('contextmenu',e=>e.preventDefault());
    document.addEventListener('selectstart',e=>e.preventDefault());
    document.addEventListener('keydown',e=>{
      // Block F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S
      if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&['u','U','s','S'].includes(e.key))){
        e.preventDefault();
      }
    });
  }
})();

// в”Җв”Җ SECURITY LAYER 5: SECURE FETCH WRAPPER (attaches CSRF + fingerprint) в”Җв”Җв”Җв”Җв”Җ
window.secureFetch=(url,opts={})=>{
  const headers={
    'Content-Type':'application/json',
    'X-CSRF-Token':_csrf,
    'X-Fingerprint':_fp,
    ...(opts.headers||{})
  };
  // Attach JWT from httpOnly cookie automatically (browser handles it)
  return fetch(url,{...opts,headers,credentials:'include'});
};

// в”Җв”Җ SECURITY LAYER 6: TOKEN EXPIRY WATCHER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
(()=>{
  // Check session validity every 5 min
  const CHECK_INTERVAL=5*60*1000;
  const checkSession=async()=>{
    try{
      const r=await secureFetch('/api/auth/verify');
      if(!r.ok&&window._isAdmin){
        window.location.href='/admin/login.html';
      }
    }catch{}
  };
  setInterval(checkSession,CHECK_INTERVAL);
})();
</script>
